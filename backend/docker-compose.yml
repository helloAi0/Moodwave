version: '3.8'

services:
  api:
    build: .
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - .:/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:moodwave_pass@db:5432/moodwave_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moodwave_pass
      POSTGRES_DB: moodwave_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: